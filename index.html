<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LONGCHA CAFE</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #f5f5f5;
}

.header {
  text-align: center;
  background: white;
  padding: 20px;
}

.header img {
  width: 100%;
  max-height: 200px;
  object-fit: cover;
  border-radius: 10px;
}

h2 {
  margin: 10px 0;
}

.menu {
  padding: 15px;
}

.category {
  margin-bottom: 20px;
}

.category h3 {
  background: #2e7d32;
  color: white;
  padding: 10px;
  border-radius: 8px;
}

.item {
  background: white;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

button {
  background: #2e7d32;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
}

.order-box {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<div class="header">
  <!-- 👇 ใส่ชื่อไฟล์รูปตรงนี้ -->
  <img src="quality_restoration_25690422222956772.jpeg">
  <h2>LONGCHA CAFE</h2>
</div>

<div class="menu" id="menu"></div>

<div class="order-box">
  <button onclick="sendOrder()">สั่งผ่าน LINE</button>
</div>

<script>

let order = [];

function addItem(name, price){
  let sweet = prompt("เลือกระดับความหวาน (0%,25%,50%,75%,100%)");
  let pearl = confirm("ใส่ไข่มุกฟรีไหม?");
  
  order.push(`${name} ${sweet || ""} ${pearl ? "+ไข่มุก" : ""} (${price}฿)`);
  alert("เพิ่มแล้ว");
}

function sendOrder(){
  if(order.length === 0){
    alert("ยังไม่ได้เลือกเมนู");
    return;
  }

  let text = "สั่งออเดอร์:\n" + order.join("\n");
  let url = "https://line.me/R/ti/p/@485xunyk?text=" + encodeURIComponent(text);
  window.open(url);
}

const menus = [

{title:"เมนูชงเย็น (30฿)", items:[
"ชาเขียว","ชาไทย","เนสกาแฟ","เผือก","แคนตาลูป","โกโก้","ช็อคโกแลต","นมสด","นมชมพู","โอวัลติน","ไมโล"
], price:30},

{title:"เมนูปั่น (40฿)", items:[
"นมสดปั่น","โกโก้ปั่น","เผือกปั่น","ชาไทยปั่น","ชาเขียวปั่น","ช็อคโกแลตปั่น","แคนตาลูปปั่น","โอวัลตินปั่น","ไมโลปั่น","นมสดคาราเมล","เนสกาแฟปั่น","ปีโป้นมสดปั่น"
], price:40},

{title:"เมนูวิปล้วน (25฿)", items:[
"สตรอเบอรี่","บลูเบอรี่","ช็อคโกแลต","คาราเมล","คอนเฟล็กซ","โอริโอ้"
], price:25},

{title:"เมนูปังเย็น (45฿)", items:[
"นมชมพู","โกโก้","ชาเขียว","ชาไทย","นมสด"
], price:45},

{title:"อิตาเลียนโซดา (30฿)", items:[
"กีวี่","สตรอเบอร์รี่","บลูเบอร์รี่","แคนตาลูป","บลูฮาวาย","แอปเปิ้ลเขียว","พั้นซ์แดง","เสาวรส","แดงมะนาว","น้ำผึ้งมะนาว","น้ำส้มโซดา"
], price:30},

{title:"สมูทตี้ (50฿)", items:[
"มะนาว","เสาวรส","มะม่วง","เบอร์รี่","บลูเบอรี่","อโวคาโด้","สตรอเบอร์รี่","ส้ม","กีวี่","สับปะรด"
], price:50},

{title:"โยเกิร์ตสมูทตี้ (60฿)", items:[
"มะนาว","เสาวรส","มะม่วง","เบอร์รี่","บลูเบอรี่","อโวคาโด้","สตรอเบอร์รี่","ส้ม","กีวี่","สับปะรด"
], price:60}

];

const menuDiv = document.getElementById("menu");

menus.forEach(cat=>{
  let div = document.createElement("div");
  div.className = "category";
  
  let html = `<h3>${cat.title}</h3>`;
  
  cat.items.forEach(item=>{
    html += `
    <div class="item">
      <span>${item}</span>
      <button onclick="addItem('${item}', ${cat.price})">+</button>
    </div>
    `;
  });

  div.innerHTML = html;
  menuDiv.appendChild(div);
});

</script>

</body>
</html>
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>LONGCHA Cafe</title>
<style>
body { font-family: sans-serif; padding:20px; }
button { margin:5px; padding:10px; }
#total { font-size:20px; margin-top:20px; }
img { margin-top:20px; width:200px; }
</style>
</head>

<body>

<h2>เมนู</h2>

<button onclick="addItem(45)">อเมริกาโน่มะพร้าว</button>
<button onclick="addItem(45)">อเมริกาโน่ส้ม</button>
<button onclick="addItem(45)">เอสเพรสโซ่</button>

<button onclick="addItem(50)">มะพร้าวนมสดชาไทย ปั่น</button>
<button onclick="addItem(45)">ชาไทยทูโทน</button>

<div id="total">รวม: 0 บาท</div>

<!-- QR -->
<img id="qr" src="" style="display:none;">

<script>
let total = 0;

function addItem(price){
    total += price;
    updateTotal();
}

function updateTotal(){
    document.getElementById("total").innerText = "รวม: " + total + " บาท";

    if(total > 0){
        // ใส่ลิงก์ QR ของแบมตรงนี้
        document.getElementById("qr").src = "URL_QR_ของแบม";
        document.getElementById("qr").style.display = "block";
    }
}
</script>

</body>
</html>
