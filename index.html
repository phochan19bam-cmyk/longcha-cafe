<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LONGCHA CAFE</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

header {
  background: #00b050;
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.menu {
  padding: 10px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  background: #00b050;
  color: white;
  border: none;
  padding: 5px 10px;
  border-radius: 5px;
}
</style>
</head>

<body>

<header>LONGCHA CAFE</header>

<div class="menu" id="menu"></div>

<script>

const menu = [
  {name:"อเมริกาโน่มะพร้าวเย็น", price:45},
  {name:"เอสเพรสโซ่เย็น", price:45},
  {name:"ชาไทยเย็น", price:30},
  {name:"ชาเขียวเย็น", price:30},
  {name:"โกโก้เย็น", price:30},
  {name:"สตรอเบอร์รี่โซดา", price:30},
  {name:"มะม่วงสมูทตี้", price:50},
  {name:"นมสดปั่น", price:40},
  {name:"ปังเย็นโกโก้", price:45},
  {name:"วิปครีมช็อคโกแลต", price:25}
];

const menuDiv = document.getElementById("menu");

menu.forEach(item => {
  menuDiv.innerHTML += `
    <div class="card">
      <h3>${item.name}</h3>
      <p>${item.price} บาท</p>
      <button onclick="add('${item.name}',${item.price})">เพิ่ม</button>
    </div>
  `;
});

let total = 0;

function add(name, price){
  total += price;
  alert("เพิ่ม " + name + " | รวม " + total + " บาท");
}

</script>

</body>
</html>
