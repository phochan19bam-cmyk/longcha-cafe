<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LONGCHA CAFE</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

header {
  background: #00b050;
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.menu {
  padding: 10px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  background: #00b050;
  color: white;
  border: none;
  padding: 5px 10px;
  border-radius: 5px;
}
</style>
</head>

<body>

<header>LONGCHA CAFE</header>

<div class="menu" id="menu"></div>

<script>

const menu = [
  {name:"อเมริกาโน่มะพร้าวเย็น", price:45},
  {name:"เอสเพรสโซ่เย็น", price:45},
  {name:"ชาไทยเย็น", price:30},
  {name:"ชาเขียวเย็น", price:30},
  {name:"โกโก้เย็น", price:30},
  {name:"สตรอเบอร์รี่โซดา", price:30},
  {name:"มะม่วงสมูทตี้", price:50},
  {name:"นมสดปั่น", price:40},
  {name:"ปังเย็นโกโก้", price:45},
  {name:"วิปครีมช็อคโกแลต", price:25}
];

const menuDiv = document.getElementById("menu");

menu.forEach((item, index) => {
  menuDiv.innerHTML += `
    <div class="card">
      <h3>${item.name}</h3>
      <p>${item.price} บาท</p>

      <label>ความหวาน</label><br>
      <select id="sweet${index}">
        <option>หวาน 100%</option>
        <option>หวาน 75%</option>
        <option>หวาน 50%</option>
        <option>หวาน 25%</option>
        <option>ไม่หวาน</option>
      </select>

      <br><br>

      <label>
        <input type="checkbox" id="ice${index}">
        แยกน้ำแข็ง
      </label>

      <br>

      <label>
        <input type="checkbox" id="boba${index}">
        ใส่ไข่มุก
      </label>

      <br><br>

      <button onclick="add(${index})">เพิ่ม</button>
    </div>
  `;
});

let total = 0;

function add(i){
  let item = menu[i];

  let sweet = document.getElementById("sweet"+i).value;
  let ice = document.getElementById("ice"+i).checked ? "แยกน้ำแข็ง" : "น้ำแข็งปกติ";
  let boba = document.getElementById("boba"+i).checked ? "ใส่ไข่มุก" : "ไม่ใส่ไข่มุก";

  total += item.price;

  alert(
    "เพิ่ม " + item.name +
    "\n" + sweet +
    "\n" + ice +
    "\n" + boba +
    "\nรวม " + total + " บาท"
  );
}

</script>
