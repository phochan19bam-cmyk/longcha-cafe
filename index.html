let cart=[];

const menuDiv=document.getElementById("menu");

menu.forEach((item,i)=>{

<img src="${item.name}.jpg" onerror="this.src='logo.jpg'">

<h3>${item.name}</h3>
<p>${item.price} บาท</p>

<select id="sweet${i}">
<option>หวาน 100%</option>
<option>หวาน 75%</option>
<option>หวาน 50%</option>
<option>หวาน 25%</option>
<option>ไม่หวาน</option>
</select>

<label><input type="checkbox" id="whip${i}"> เพิ่มวิปครีม +10</label><br>
<label><input type="checkbox" id="cheese${i}"> เพิ่มครีมชีส +15</label>

<br>

<label><input type="checkbox" id="ice${i}"> แยกน้ำแข็ง</label>
<label><input type="checkbox" id="boba${i}"> ไข่มุก</label>

<br><br>

<button onclick="add(${i})">เพิ่ม</button>

</div>
`;
});

function add(i){

let item = menu[i];

let sweet = document.getElementById("sweet"+i).value;
let ice = document.getElementById("ice"+i).checked ? "แยกน้ำแข็ง" : "น้ำแข็งปกติ";
let boba = document.getElementById("boba"+i).checked ? "ใส่ไข่มุก" : "ไม่ใส่ไข่มุก";

let whip = document.getElementById("whip"+i).checked;
let cheese = document.getElementById("cheese"+i).checked;

let price = item.price;

if(whip) price += 10;
if(cheese) price += 15;

let found = cart.find(c =>
    c.name===item.name &&
    c.sweet===sweet &&
    c.ice===ice &&
    c.boba===boba &&
    c.whip===whip &&
    c.cheese===cheese
);

if(found){
    found.qty++;
}else{
    cart.push({
        name:item.name,
        price:price,
        qty:1,
        sweet,
        ice,
        boba,
        whip,
        cheese
    });
}

update();

}

function update(){
let total=0,count=0,html="";

cart.forEach((c,i)=>{
total+=c.price*c.qty;
count+=c.qty;

let option=[];

option.push(c.sweet);
option.push(c.ice);
option.push(c.boba);

if(c.whip) option.push("วิปครีม");
if(c.cheese) option.push("ครีมชีส");

html+=`${c.name} (${option.join(", ")})
<button onclick="minus(${i})">-</button>
${c.qty}
<button onclick="plus(${i})">+</button><br>`;
});

document.getElementById("total").innerText=total;
document.getElementById("count").innerText=count;
document.getElementById("cartItems").innerHTML=html;
}

function plus(i){cart[i].qty++;update();}
function minus(i){cart[i].qty--;if(cart[i].qty<=0)cart.splice(i,1);update();}

function toggleCart(){
let c=document.getElementById("cart");
c.style.display=c.style.display==="block"?"none":"block";
}

function sendLine(){
let msg="ออเดอร์ LONGCHA\n";
cart.forEach(c=>{
let option=[];

option.push(c.sweet);
option.push(c.ice);
option.push(c.boba);

if(c.whip) option.push("วิปครีม");
if(c.cheese) option.push("ครีมชีส");

msg+=`${c.name} x${c.qty} (${option.join(", ")})\n`;
});
msg+="รวม "+document.getElementById("total").innerText+" บาท";

window.open("https://line.me/R/oaMessage/@485xunyk/?"+encodeURIComponent(msg));
}
