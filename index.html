<style>

header{background:#16c25b;color:#fff;text-align:center;padding:15px;font-size:22px;}

.tabs{
  display:flex;
  overflow-x:auto;
  background:#fff;
}
.tabs button{
  border:none;
  background:#eee;
  padding:10px;
  margin:5px;
  border-radius:20px;
}
.tabs button.active{background:#16c25b;color:#fff;}

.menu{padding:10px;}

.item{
  background:#fff;
  margin:10px 0;
  border-radius:12px;
  padding:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.item img{width:100%;border-radius:10px;}

.cart-btn{
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
  background:#16c25b;
  color:#fff;
  padding:12px;
  text-align:center;
  border-radius:12px;
}

.popup{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  max-height:70%;
  overflow:auto;
  display:none;
  border-radius:15px 15px 0 0;
  padding:10px;
}
</style>
</head>

<body>

<div class="tabs" id="tabs"></div>
<div class="menu" id="menu"></div>

<div class="cart-btn" onclick="openCart()">
🛒 ดูตะกร้า | รวม <span id="total">0</span> บาท
</div>

function getPrice(cat){
  if(cat==="กาแฟเย็น") return 45;
  if(cat==="เมนูพิเศษ") return 50;
  if(cat==="วิปครีม") return 25;
  if(cat==="ปังเย็น") return 45;
  if(cat==="ปั่น") return 40;
  if(cat==="ชงเย็น") return 30;
  if(cat==="โซดา") return 30;
  if(cat==="สมูทตี้") return 50;
  if(cat==="โยเกิร์ต") return 60;
}

let current = Object.keys(categories)[0];
let cart=[];

function renderTabs(){
  let html="";
  Object.keys(categories).forEach(c=>{
    html+=`<button onclick="changeTab('${c}')" class="${c===current?'active':''}">${c}</button>`;
  });
  document.getElementById("tabs").innerHTML=html;
}

function renderMenu(){
  let box=document.getElementById("menu");
  box.innerHTML="";

  categories[current].forEach(n=>{
    let p=getPrice(current);

    box.innerHTML+=`
    <div class="item">
      <img src="${n}.jpg" onerror="this.src='logo.jpg'">
      <h3>${n}</h3>
      <p>${p} บาท</p>

      <select id="s-${n}">
        <option>หวาน 100%</option>
        <option>หวาน 75%</option>
        <option>หวาน 50%</option>
        <option>หวาน 25%</option>
        <option>ไม่หวาน</option>
      </select>

      <select id="i-${n}">
        <option>น้ำแข็งปกติ</option>
        <option>น้ำแข็งน้อย</option>
        <option>ไม่ใส่น้ำแข็ง</option>
      </select>

      <select id="t-${n}">
        <option>ไม่ใส่ไข่มุก</option>
        <option>ใส่ไข่มุก</option>
      </select>

      <br>
      <button onclick="add('${n}',${p})">เพิ่ม</button>
    </div>
    `;
  });
}

function changeTab(c){
  current=c;
  renderTabs();
  renderMenu();
}

function add(n,p){
  cart.push({
    n,
    p,
    s:document.getElementById("s-"+n).value,
    i:document.getElementById("i-"+n).value,
    t:document.getElementById("t-"+n).value
  });
  updateTotal();
}

function updateTotal(){
  document.getElementById("total").innerText=
  cart.reduce((a,b)=>a+b.p,0);
}

function openCart(){
  let box=document.getElementById("cart");
  box.style.display="block";

  let html="<h3>ตะกร้า</h3>";

  cart.forEach((c,i)=>{
    html+=`
    <p>${c.n} (${c.s},${c.i},${c.t})
    <button onclick="del(${i})">ลบ</button></p>`;
  });

  html+=`<hr>
  <h3>รวม ${cart.reduce((a,b)=>a+b.p,0)} บาท</h3>
  <img src="qr.jpg" width="200">`;

  box.innerHTML=html;
}

function del(i){
  cart.splice(i,1);
  updateTotal();
  openCart();
}

renderTabs();
renderMenu();

</script>
